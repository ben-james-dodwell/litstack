name: deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer Dependencies
        uses: actions/cache@v6
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-release-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-release-

      - name: Install PHP Dependencies
        run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

      - name: Install Node Dependencies
        run: npm ci

      - name: Build Assets
        run: npm run build

      - name: Package Release Artifact
        run: tar czf release.tar.gz vendor public/build

      - name: Upload Release Artifact
        uses: actions/upload-artifact@v7
        with:
          name: release
          path: release.tar.gz
          retention-days: 1

  deploy-demo:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: Demo
    steps:
      - name: Download Release Artifact
        uses: actions/download-artifact@v8
        with:
          name: release

      - name: Copy Release Artifact to Server
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.DEMO_SSH_HOST }}
          username: ${{ secrets.DEMO_SSH_USER }}
          key: ${{ secrets.DEMO_SSH_KEY }}
          source: release.tar.gz
          target: /tmp

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.DEMO_SSH_HOST }}
          username: ${{ secrets.DEMO_SSH_USER }}
          key: ${{ secrets.DEMO_SSH_KEY }}
          script: |
            set -e
            cd /var/www/litstack-demo

            git fetch --all
            git reset --hard origin/master

            rm -rf vendor public/build
            tar xzf /tmp/release.tar.gz -C .
            rm -f /tmp/release.tar.gz

            php artisan migrate --force
            php artisan db:seed --class=Database\\Seeders\\ShelfSeeder --force
            php artisan optimize:clear
            php artisan optimize

            php artisan queue:restart

  deploy-live:
    needs: [build, deploy-demo]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: Production
    steps:
      - name: Download Release Artifact
        uses: actions/download-artifact@v8
        with:
          name: release

      - name: Copy Release Artifact to Server
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.LIVE_SSH_HOST }}
          username: ${{ secrets.LIVE_SSH_USER }}
          key: ${{ secrets.LIVE_SSH_KEY }}
          source: release.tar.gz
          target: /tmp

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.LIVE_SSH_HOST }}
          username: ${{ secrets.LIVE_SSH_USER }}
          key: ${{ secrets.LIVE_SSH_KEY }}
          script: |
            set -e
            cd /var/www/litstack

            git fetch --all
            git reset --hard origin/master

            rm -rf vendor public/build
            tar xzf /tmp/release.tar.gz -C .
            rm -f /tmp/release.tar.gz

            php artisan migrate --force
            php artisan optimize:clear
            php artisan optimize

            php artisan queue:restart
